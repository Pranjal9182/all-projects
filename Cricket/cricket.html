<button onclick="localStorage.clear()
resetScore();
">Reset</button>

let scoreStr=localStorage.getItem('Score');
let score;
resetScore(scoreStr);
    // let resultMsg;
    
    function resetScore(scoreStr){
     score = scoreStr?JSON.parse(scoreStr):{
      win: 0,
      lose: 0,
      tie: 0,
    
    };
 score.displayScore=  function(){
        return `Won:${score.win},Lose:${score.lose},Tie: ${score.tie}`;
      }
    }
    function generateComputerChoice() {
      let randomNumber = Math.random() * 3;

      if (randomNumber > 0 && randomNumber <= 1) {
        return 'Bat';
      }
      else if (randomNumber > 1 && randomNumber <= 2) {
        return 'Ball';

      }
      else {
        return 'Stump';
      }
    }
    function getResult(userMove, computerMove) {
      if (userMove === 'Bat') {
        if (computerMove === 'Ball') {
          score.win++;
          return 'User won';
        }
        else if (computerMovee === 'Bat') {
          score.tie++;
          return `It's a tie`;
        }
        else if (computerMove === 'Stump') {
          score.lose++
          return 'Computer has Won';
        }
      } else if (userMove === 'Ball') {
        if (computerMove === 'Ball') {
          score.tie++;
          return `It's a tie`;
        }
        else if (computerMove === 'Bat') {
          score.lose++;
          return 'Computer Won';
        }
        else if (computerMove === 'Stump') {
          score.win++;
          return 'User Won';
        }
      } else {
        if (computerMove === 'Ball') {
          score.lose++;
          return 'Computer has Won';
        }
        else if (computerMove === 'Bat') {
          score.win++;
          return 'User has Won';

          score.tie++;

        }

    }
    function showResult(userMove, computerMove, result) {
      localStorage.setItem('Score',JSON.stringify(score));
      console.log(score);
      alert(`You have chosen ${userMove}. Computer has chosen  ${computerMove} and ${result};

${score.displayScore()}`);
    }
    function play(userMove) {
      let computerMove = generateComputerChoice();
      let resultMsg = getResult(userMove, computerMove);
      showResult(userMove, computerMove, resultMsg);
    }
  </script>
