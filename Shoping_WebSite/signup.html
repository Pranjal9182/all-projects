<!DOCTYPE html>
<html lang="en">

<head>
  <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f1f3f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    padding: 30px;
    border-radius: 8px;
    width: 340px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

/* Heading */
h2 {
    text-align: center;
    margin-bottom: 8px;
}

/* Subtitle */
.subtitle {
    text-align: center;
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

/* Labels */
label {
    font-size: 14px;
    display: block;
    margin-top: 10px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #2874f0;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #1f5ed6;
}

/* Bottom link */
.links {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.links a {
    color: #2874f0;
    text-decoration: none;
}

.links a:hover {
    text-decoration: underline;
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>

<body>
   <div class="container">
    <h2>Create Account</h2>
    <p class="subtitle">Sign up to start shopping</p>

    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your Email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit">Sign Up</button>
    </form>

    <div class="links">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>
</body>

</html>
