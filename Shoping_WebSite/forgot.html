<!DOCTYPE html>
<html lang="en">
<head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Background */
body {
    background: #f1f3f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    padding: 30px;
    border-radius: 8px;
    width: 350px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    text-align: center;
}

/* Heading */
h2 {
    margin-bottom: 10px;
}

/* Subtitle */
.subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

/* Label */
label {
    display: block;
    text-align: left;
    font-size: 14px;
    margin-bottom: 5px;
}

/* Input */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    background: #2874f0;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #1f5ed6;
}

/* Extra links */
.links {
    margin-top: 15px;
    font-size: 14px;
}

.links a {
    color: #2874f0;
    text-decoration: none;
}

.links a:hover {
    text-decoration: underline;
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
</head>
<body>
 <div class="container">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter your email to receive a reset link</p>

    <form>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your Email" required>

        <button type="submit">Send Reset Link</button>
    </form>

    <div class="links">
        <a href="login.html">Back to Login</a>
    </div>
</div>
</body>
</html>
