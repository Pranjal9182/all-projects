<!DOCTYPE html>
<html lang="en">
<head>
      <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Background */
body {
    background: #f1f3f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Product Card */
.container {
    background: white;
    padding: 25px;
    border-radius: 8px;
    width: 350px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Title */
h1 {
    font-size: 20px;
    margin-bottom: 10px;
}

/* Image */
img {
    width: 220px;
    height: 220px;
    object-fit: contain;
    margin-bottom: 10px;
}

/* Price */
.price {
    color: green;
    font-weight: bold;
    margin: 10px 0;
}

/* Description */
.desc {
    font-size: 14px;
    color: #555;
    margin-bottom: 15px;
}

/* Button */
button {
    padding: 10px 15px;
    background: #2874f0;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #1f5ed6;
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Jordan</title>
</head>

    <p></p><a href="products.html">

    </div>
</body>
</html>
