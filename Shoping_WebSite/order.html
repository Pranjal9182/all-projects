<!DOCTYPE html>
<html lang="en">
<head>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f1f3f6;
}

/* Header */
header {
    background: #2874f0;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

nav a:hover {
    text-decoration: underline;
}

/* Center content */
main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

/* Card */
.container {
    background: white;
    padding: 30px;
    border-radius: 8px;
    width: 350px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Heading */
h2 {
    margin-bottom: 10px;
    color: green;
}

/* Text */
p {
    margin-bottom: 8px;
    font-size: 14px;
    color: #555;
}

/* Order ID */
strong {
    color: #000;
}

/* Link */
a {
    display: inline-block;
    margin-top: 15px;
    color: #2874f0;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* Line */
hr {
    margin: 15px 0;
    border: none;
    height: 1px;
    background: #ddd;
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed</title>
</head>

<body>
    <header>
        <h1>Shopping Store</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <main>
         <div class="container">

    <h2>Order Placed Successfully!</h2>

    <p>Your order has been confirmed.</p>

    <p><strong>Order ID:</strong> #123456</p>

    <p>Estimated Delivery: 3-5 days</p>

    <hr>

    <p>Thank you for shopping with us!</p>

    <a href="index.html">Continue Shopping</a>
    </div>
</main>
</body>
</html>
