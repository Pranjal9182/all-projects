<!DOCTYPE html>
<html lang="en">

<head>
   <style>

/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #e6ecf3);
    color: #333;
}

/* Header */
header {
    background: #0f172a;
    color: #fff;
    padding: 20px 0;
    text-align: center;
}

header ul {
    margin-top: 10px;
    list-style: none;
}

header ul li {
    display: inline-block;
    margin: 0 12px;
}

header a {
    color: #cbd5f5;
    text-decoration: none;
    font-size: 15px;
}

header a:hover {
    color: #fff;
}

/* Main */
main {
    max-width: 1000px;
    margin: 50px auto;
    padding: 0 15px;
}

/* Title */
h2 {
    margin-bottom: 10px;
}

/* Sections layout */
section {
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

/* Form styling */
form label {
    font-weight: 500;
    font-size: 14px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 6px 0 16px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.2s;
}

input:focus, textarea:focus {
    border-color: #2563eb;
    outline: none;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

button:hover {
    background: #1e40af;
}

/* Map styling */
iframe {
    width: 100%;
    height: 300px;
    border-radius: 10px;
    margin-top: 10px;
}

/* Footer */
footer {
    margin-top: 40px;
    text-align: center;
    padding: 15px;
    background: #0f172a;
    color: #cbd5f5;
    font-size: 14px;
}

</style>

</head>
